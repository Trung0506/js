<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Photo Gallery</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
      }

      #image {
        width: 600px;
        height: 400px;
        margin: 20px auto;
        border: 2px solid #333;
        background-color: #ddd;
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #000;
        font-size: 20px;
        font-weight: bold;
      }

      .gallery img {
        width: 180px;
        height: 120px;
        margin: 10px;
        border: 2px solid #333;
        cursor: pointer;
      }

      .gallery img:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <h1>Interactive Photo Gallery</h1>

    <div id="image">Di chuột qua một hình ảnh bên dưới để hiển thị ở đây.</div>

    <div class="gallery">
      <img
        src="https://picsum.photos/id/1015/600/400"
        alt="Phong cảnh núi"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />

      <img
        src="https://picsum.photos/id/1025/600/400"
        alt="Chú chó đáng yêu"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />

      <img
        src="https://picsum.photos/id/1035/600/400"
        alt="Bãi biển đẹp"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />

      <img
        src="https://picsum.photos/id/1043/600/400"
        alt="Khu rừng xanh"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />
    </div>

    <script src="script.js"></script>
  </body>
</html>
